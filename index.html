<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 20px;
      }

      .product-grid {
        text-align: center;
      }

      .product-card {
        display: inline-block;
        width: 200px;
        margin: 10px;
        padding: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: white;
      }

      .product-card p {
        color: #8b5cf6;
        font-weight: 700;
        font-size: 20px;
        margin: 0 0 16px 0;
      }

      .btn {
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        background-color: #7d53c7;
        color: white;
        transition: all 0.3s ease;
      }

      .btn:hover {
        transform: scale(1.05);
        background: #7c3aed;
      }
    </style>
  </head>
  <body>
    <div class="product-grid">
      <div class="product-card">
        <h3>Product 1</h3>
        <p>$19</p>
        <button class="btn">Buy Now</button>
      </div>

      <div class="product-card">
        <h3>Product 2</h3>
        <p>$29</p>
        <button class="btn">Buy Now</button>
      </div>

      <div class="product-card">
        <h3>Product 3</h3>
        <p>$39</p>
        <button class="btn">Buy Now</button>
      </div>

      <div class="product-card">
        <h3>Product 4</h3>
        <p>$49</p>
        <button class="btn">Buy Now</button>
      </div>
    </div>
  </body>
</html>
